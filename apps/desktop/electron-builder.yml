appId: com.phantomos.desktop
productName: PhantomOS
copyright: Copyright © 2026 Subash Karki

directories:
  output: release
  buildResources: resources

files:
  - dist/**/*

extraResources:
  - from: ../../packages/server/dist
    to: server
    filter:
      - "**/*"
  - from: resources/server-preload.cjs
    to: server-preload.cjs

mac:
  category: public.app-category.developer-tools
  icon: resources/icon.icns
  target:
    - target: dmg
      arch:
        - universal
    - target: zip
      arch:
        - universal
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.inherit.plist
  # Signing: electron-builder auto-picks "Developer ID Application" from the
  # login Keychain when the cert is installed. Falls back to ad-hoc if no cert
  # is present — build log prints "falling back to ad-hoc signature".
  # Notarization: runs automatically when APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD,
  # and APPLE_TEAM_ID env vars are all set. Otherwise skipped.

dmg:
  title: "PhantomOS ${version}"
  artifactName: "PhantomOS-${version}-${arch}.dmg"

asar: true
asarUnpack:
  - "node_modules/**"

npmRebuild: false
nodeGypRebuild: false
buildDependenciesFromSource: false
afterPack: scripts/rebuild-native.cjs
