rules:
  - id: no-secrets-in-env
    name: no-secrets-in-env
    level: warn
    description: Warns when a tool writes a known secret pattern (API key, token) to a file.
    pattern: "(sk-[a-zA-Z0-9]{20,}|AKIA[0-9A-Z]{16}|ghp_[a-zA-Z0-9_]{10,})"
    message: "Possible secret detected in tool output"
    allow_bypass: true
    enabled: true
    audit: true
    tags:
      - pii
      - secrets
