rules:
  - id: secrets-in-response
    name: secrets-in-response
    level: warn
    description: Warns when Claude's response contains credentials or private keys.
    event_type: assistant
    pattern: "(AKIA[0-9A-Z]{16}|-----BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY|password\\s*[:=]\\s*['\"][^'\"]+)"
    message: "Claude's response contains what looks like a credential"
    allow_bypass: true
    enabled: true
    audit: true
    tags:
      - pii
      - secrets
      - response
