rules:
  - id: pii-in-prompt
    name: pii-in-prompt
    level: warn
    description: Warns when a user prompt contains what looks like a secret or API key before it is sent to Anthropic.
    event_type: user
    pattern: "(AKIA[0-9A-Z]{16}|ghp_[a-zA-Z0-9]{36}|sk-[a-zA-Z0-9]{20,}|-----BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY)"
    message: "Your prompt contains what looks like a secret — it will be sent to Anthropic's API"
    allow_bypass: true
    enabled: true
    audit: true
    tags:
      - pii
      - secrets
      - prompt
