name: Release Desktop App

on:
  push:
    tags:
      - "desktop-v*.*.*"

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/build-desktop.yml
    secrets: inherit
    with:
      artifact_prefix: release
      artifact_retention_days: 90

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#desktop-v}" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: release-*

      - name: Prepare release assets
        run: |
          mkdir -p release-assets

          # Copy all DMGs and ZIPs
          find artifacts -name '*.dmg' -exec cp {} release-assets/ \;
          find artifacts -name '*.zip' -exec cp {} release-assets/ \;

          # Create stable-named copies for /releases/latest/download/ URLs
          for f in release-assets/*-arm64*.dmg; do
            [ -f "$f" ] && cp "$f" "release-assets/PhantomOS-arm64.dmg"
          done
          for f in release-assets/*-x64*.dmg; do
            [ -f "$f" ] && cp "$f" "release-assets/PhantomOS-x64.dmg"
          done
          for f in release-assets/*-arm64*.zip; do
            [ -f "$f" ] && cp "$f" "release-assets/PhantomOS-arm64-mac.zip"
          done
          for f in release-assets/*-x64*.zip; do
            [ -f "$f" ] && cp "$f" "release-assets/PhantomOS-x64-mac.zip"
          done

          echo "Release assets:"
          ls -lh release-assets/

      - name: Find previous desktop tag
        id: prev_tag
        run: |
          prev=$(git tag -l 'desktop-v*' --sort=-v:refname | grep -v "$GITHUB_REF_NAME" | head -1)
          echo "tag=${prev:-}" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: notes
        run: |
          if [ -n "${{ steps.prev_tag.outputs.tag }}" ]; then
            echo "## Changes" > release-notes.md
            echo "" >> release-notes.md
            git log --pretty=format:"- %s (%h)" \
              "${{ steps.prev_tag.outputs.tag }}..${GITHUB_REF_NAME}" >> release-notes.md
          else
            echo "Initial release of PhantomOS Desktop." > release-notes.md
          fi

          cat <<FOOTER >> release-notes.md

## Downloads

| Platform | Architecture | File |
|----------|-------------|------|
| macOS | Apple Silicon (arm64) | \`PhantomOS-arm64.dmg\` |
| macOS | Intel (x64) | \`PhantomOS-x64.dmg\` |

### Stable download URLs
\`\`\`
https://github.com/${{ github.repository }}/releases/latest/download/PhantomOS-arm64.dmg
https://github.com/${{ github.repository }}/releases/latest/download/PhantomOS-x64.dmg
\`\`\`
FOOTER

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --repo "${{ github.repository }}" \
            --title "PhantomOS ${{ steps.version.outputs.version }}" \
            --notes-file release-notes.md \
            --draft \
            release-assets/*
